    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, .font-headline { font-family: 'Space Grotesk', sans-serif; }

        /* Scrollbar styling */

        ::-webkit-scrollbar-thumb:hover { background: #717583; }

        /* =============================================
           GLOWING TAB NAVIGATION
        ============================================= */
        @layer glowing-nav-properties {
          @property --after-bg-position {
            syntax: "<number>";
            inherits: true;
            initial-value: 0;
          }
          @property --after-radial-bg-position {
            syntax: "<number>";
            inherits: true;
            initial-value: 0;
          }
          @property --after-bg-width {
            syntax: "<number>";
            inherits: true;
            initial-value: 100;
          }
          @property --after-bg-opacity {
            syntax: "<number>";
            inherits: true;
            initial-value: 20;
          }
          @property --after-shadow-offset {
            syntax: "<number>";
            inherits: true;
            initial-value: 15;
          }
          @property --after-scale {
            syntax: "<number>";
            inherits: true;
            initial-value: 0.85;
          }
          @property --li-before-opacity {
            syntax: "<number>";
            inherits: true;
            initial-value: 0;
          }
        }

        :root {
          --glow-easing: cubic-bezier(.41, -0.09, .55, 1.09);
          --glow-timing: 300ms;
          --glow-delay: 80ms;
        }

        .glow-nav {
          transition:
            --after-bg-position var(--glow-timing) var(--glow-easing) 0.2s,
            --after-radial-bg-position var(--glow-timing) var(--glow-easing) 0.2s,
            --after-bg-width var(--glow-timing) var(--glow-easing) 0.2s,
            --after-bg-opacity var(--glow-timing) var(--glow-easing) 0.2s,
            --li-before-opacity var(--glow-timing) var(--glow-easing) 0.2s;
          background: rgba(10, 14, 25, 0.85);
          backdrop-filter: blur(20px);
          border-bottom: 1px solid rgba(255,255,255,0.07);
          position: relative;
        }

        .glow-nav-inner {
          position: relative;
          border-radius: 100px;
        }

        .glow-nav-inner:before {
          content: "";
          display: block;
          position: absolute;
          width: calc(calc(var(--after-bg-width) * 1px) - 8px);
          height: 100%;
          background: rgb(167 165 255 / calc(var(--after-shadow-offset)*1%));
          border-radius: 100px;
          filter: blur(18px);
          left: 0;
          top: 0;
          transform: translateX(calc(var(--after-bg-position) * 1px)) scale(1.1);
          pointer-events: none;
        }

        .glow-nav-list {
          position: relative;
          padding: 0;
          margin: 0;
          list-style: none;
          display: flex;
          justify-content: space-between;
          border-radius: 100px;
          background-position: center center;
          background-image: radial-gradient(
            ellipse 140px 90px at calc(var(--after-radial-bg-position)*1px) bottom,
            rgba(167,165,255,0.7) 0%,
            rgba(167,165,255,0.1) 100%
          );
        }

        .glow-nav-list:before {
          content: "";
          display: block;
          position: absolute;
          width: calc(100% - 2px);
          height: calc(100% - 2px);
          background: #0a0e19;
          top: 1px;
          left: 1px;
          border-radius: 100px;
        }

        .glow-nav-list:after {
          content: "";
          display: block;
          position: absolute;
          z-index: 1;
          width: calc(calc(var(--after-bg-width) * 1px) - 12px);
          height: calc(100% - 12px);
          background: linear-gradient(to bottom, rgb(167 165 255 / calc(calc(var(--after-bg-opacity, 0)/10)*1%)), rgba(167,165,255,0.08));
          box-shadow: inset 0 -6px calc(var(--after-shadow-offset, 0)*1px) rgb(167 165 255 / calc(var(--after-bg-opacity)*1%));
          left: 6px;
          top: 6px;
          transform: translate(calc(var(--after-bg-position) * 1px), 0);
          border-radius: 100px 12px 12px 100px;
          transition:
            --after-bg-opacity var(--glow-timing) var(--glow-easing) var(--glow-delay),
            --after-shadow-offset var(--glow-timing) var(--glow-easing) var(--glow-delay),
            border-radius var(--glow-timing) var(--glow-easing) var(--glow-delay);
          pointer-events: none;
        }

        .glow-nav-list:active { --after-scale: 0.75; }

        .glow-nav-item {
          height: 52px;
          width: 100%;
          position: relative;
          transform-style: preserve-3d;
          perspective: 800px;
        }

        .glow-nav-item:not(.active):hover { --li-before-opacity: 0.3; }

        .glow-nav-item:before {
          content: "";
          display: block;
          position: absolute;
          z-index: 1;
          width: 100%;
          height: 100%;
          top: 0; left: 0;
          border-radius: 8px;
          pointer-events: none;
          user-select: none;
          background: linear-gradient(to bottom, rgba(167,165,255,0.05), rgba(167,165,255,0.35));
          opacity: var(--li-before-opacity);
          transform: scale(var(--after-scale)) translateZ(15px);
          transition:
            --li-before-opacity var(--glow-timing) var(--glow-easing),
            --after-scale calc(var(--glow-timing)/2) var(--glow-easing) calc(var(--glow-delay)/2);
        }

        .glow-nav-item:first-of-type:before { border-radius: 100px 12px 12px 100px; }
        .glow-nav-item:last-of-type:before { border-radius: 12px 100px 100px 12px; }

        .glow-nav-item a, .glow-nav-item button {
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 6px;
          width: 100%;
          height: 100%;
          padding: 0 18px;
          text-decoration: none;
          font-family: 'Space Grotesk', sans-serif;
          font-size: 0.85rem;
          font-weight: 500;
          letter-spacing: 0.01em;
          color: rgba(167,165,255,0.5);
          position: relative;
          z-index: 10;
          background: none;
          border: none;
          cursor: pointer;
          white-space: nowrap;
          transition: color 0.2s;
        }
        .glow-nav-item.active a,
        .glow-nav-item.active button { color: #fff; }
        .glow-nav-item:not(.active) a:hover,
        .glow-nav-item:not(.active) button:hover { color: rgba(255,255,255,0.7); }

        .glow-nav-list:has(.glow-nav-item.active:first-of-type a):after { border-radius: 100px 12px 12px 100px; }
        .glow-nav-list:has(.glow-nav-item.active:last-of-type a):after { border-radius: 12px 100px 100px 12px; }
        .glow-nav-list:has(.glow-nav-item.active:nth-child(n+2):nth-child(-n+3) a):after { border-radius: 100px; }

        /* =============================================
           CREEPY EYE BUTTON
           – Back layer (black) holds the eyes.
           – Front cover (gradient) slides UP on hover
             to reveal the eyes peeking from behind.
        ============================================= */
        .creepy-btn {
          /* The black back layer – eyes live here */
          background-color: #000;
          border-radius: 1.25em;
          color: #e8eafb;
          cursor: pointer;
          font-family: 'Space Grotesk', sans-serif;
          font-weight: 700;
          font-size: 0.9rem;
          letter-spacing: 0.04em;
          min-width: 8em;
          outline: 0.1875em solid transparent;
          border: none;
          transition: outline 0.1s linear;
          -webkit-tap-highlight-color: transparent;
          /* Stack layers */
          position: relative;
          padding: 0;
          display: inline-flex;
          align-items: stretch;
          overflow: hidden;
        }

        /* Eyes container sits ON the black back layer */
        .creepy-btn__eyes {
          position: absolute;
          display: flex;
          align-items: center;
          gap: 0.4em;
          /* vertically centred, horizontally centred */
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          pointer-events: none;
          z-index: 0;
        }

        .creepy-btn__eye {
          animation: creepy-eye-blink 3s infinite;
          background-color: #fff;
          border-radius: 50%;
          overflow: hidden;
          width: 0.85em;
          height: 0.85em;
          flex-shrink: 0;
          position: relative;
        }

        .creepy-btn__pupil {
          position: absolute;
          aspect-ratio: 1;
          top: 50%;
          left: 50%;
          width: 0.42em;
          background-color: #111;
          border-radius: 50%;
          transform: translate(-50%, -50%);
        }

        /* Front cover sits OVER the back layer, slides UP on hover */
        .creepy-btn__cover {
          position: relative;
          z-index: 1;
          /* Gradient front face */
          background: linear-gradient(135deg, #a7a5ff 0%, #53ddfc 100%);
          box-shadow: 0 0 0 0.1em rgba(0,0,0,0.4) inset;
          padding: 0.65em 1.4em;
          border-radius: 1.25em;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 0.5em;
          white-space: nowrap;
          color: #0a0e19;
          font-weight: 700;
          width: 100%;
          /* Slide UP on hover */
          transform: translateY(0);
          transition: transform 0.32s cubic-bezier(0.65, 0, 0.35, 1.5),
                      background 0.3s ease,
                      box-shadow 0.3s ease;
          will-change: transform;
        }

        .creepy-btn:hover .creepy-btn__cover,
        .creepy-btn:focus-visible .creepy-btn__cover {
          transform: translateY(-110%);
          transition-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1);
          background: linear-gradient(135deg, #8885ff 0%, #40ceed 100%);
        }

        .creepy-btn:active .creepy-btn__cover {
          transform: translateY(0);
          transition-timing-function: cubic-bezier(0.65, 0, 0.35, 1);
        }

        .creepy-btn:focus-visible { outline: 0.1875em solid #a7a5ff; }

        @keyframes creepy-eye-blink {
          0%, 92%, 100% {
            animation-timing-function: cubic-bezier(0.32, 0, 0.67, 0);
            height: 0.85em;
          }
          96% {
            animation-timing-function: cubic-bezier(0.33, 1, 0.68, 1);
            height: 0;
          }
        }

        /* =============================================
           GLOBAL FOOTER
        ============================================= */
        .hb-footer {
          display: flex;
          align-items: center;
          gap: 0;
          background: rgba(10,14,25,0.94);
          backdrop-filter: blur(20px);
          border-top: 1px solid rgba(167,165,255,0.12);
          padding: 0 2.5rem;
          min-height: 80px;
          position: relative;
          overflow: visible; /* Allow clock to pop out */
        }
        .hb-footer::before {
          content: '';
          position: absolute;
          inset: 0;
          background: linear-gradient(90deg, rgba(167,165,255,0.04) 0%, transparent 60%);
          pointer-events: none;
        }

        /* Clock side */
        .hb-footer__clock {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 2px;
          opacity: 0;
          transition: opacity 0.6s ease;
          flex-shrink: 0;
          height: 80px; /* match footer */
        }
        .hb-footer__clock.footer-clock-ready { opacity: 1; }

        #footer-spider-wBody {
          width: 150px;
          height: 120px; /* shorter to help alignment */
          position: relative;
          flex-shrink: 0;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        #footer-spider-watch {
          position: absolute;
          top: 50%; left: 50%;
          transform: translate(-50%, -50%);
          width: 100%; height: 100%;
        }
        #footer-spider-svg {
          overflow: visible;
          width: 100%; height: 100%;
          filter:
            drop-shadow(0 0 10px rgba(167,165,255,1))
            drop-shadow(0 0 25px rgba(167,165,255,0.7));
        }
        .hb-footer__clock-label {
          font-family: 'Space Grotesk', sans-serif;
          font-size: 0.55rem;
          letter-spacing: 0.18em;
          color: rgba(167,165,255,0.5);
          text-transform: uppercase;
        }

        /* Divider */
        .hb-footer__divider {
          width: 1px;
          height: 48px;
          background: linear-gradient(to bottom, transparent, rgba(167,165,255,0.3), transparent);
          margin: 0 2rem;
          flex-shrink: 0;
        }

        /* Credits side */
        .hb-footer__credits {
          display: flex;
          flex-direction: column;
          gap: 4px;
          flex: 1;
        }
        .hb-footer__brand {
          display: flex;
          align-items: baseline;
          gap: 0.5rem;
        }
        .hb-footer__brand-name {
          font-family: 'Space Grotesk', sans-serif;
          font-weight: 700;
          font-size: 1.1rem;
          color: #fff;
          letter-spacing: -0.02em;
        }
        .hb-footer__brand-version {
          font-size: 0.65rem;
          color: rgba(167,165,255,0.4);
          font-family: 'Space Grotesk', sans-serif;
        }
        .hb-footer__author {
          display: flex;
          flex-direction: column;
          gap: 1px;
        }
        .hb-footer__author-name {
          font-family: 'Space Grotesk', sans-serif;
          font-weight: 600;
          font-size: 0.95rem;
          color: #a7a5ff;
        }
        .hb-footer__author-title {
          font-size: 0.72rem;
          color: rgba(167,165,255,0.5);
          font-family: 'Inter', sans-serif;
          letter-spacing: 0.04em;
        }
        .hb-footer__copy {
          font-size: 0.62rem;
          color: rgba(255,255,255,0.2);
          font-family: 'Inter', sans-serif;
          letter-spacing: 0.06em;
          text-transform: uppercase;
          margin-top: 2px;
        }

        /* Right side tagline */
        .hb-footer__tagline {
          margin-left: auto;
          font-family: 'Space Grotesk', sans-serif;
          font-size: 0.65rem;
          letter-spacing: 0.18em;
          color: rgba(255,255,255,0.1);
          text-transform: uppercase;
          text-align: right;
        }
    </style>
</head>
